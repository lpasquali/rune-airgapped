# RUNE API values for airgapped deployment
---
replicaCount: 1

# IEC 62443 SR 3.1: RBAC and Auth.
# Note: Temporarily disabling auth to avoid 404 on estimates in airgapped dev.
# production.yaml should re-enable this with proper secret handling.
env:
  RUNE_API_AUTH_DISABLED: "1"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 128Mi
