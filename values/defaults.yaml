# Default values for RUNE airgapped deployment
# IEC 62443 SM-10: Baseline versions for airgapped verification.
---
runeVersion: "v0.0.0a5"
crossplaneVersion: "2.2.0"

crossplane:
  enabled: false

global:
  registry: rune-registry.rune-registry.svc:5000
  imagePullPolicy: IfNotPresent
  storageClass: standard
