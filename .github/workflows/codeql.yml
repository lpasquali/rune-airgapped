# SPDX-License-Identifier: Apache-2.0
name: Code Scanning (CodeQL)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    uses: lpasquali/rune-ci/.github/workflows/codeql.yml@main
    with:
      language: "python"
