# SPDX-License-Identifier: Apache-2.0
name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  attestations: write
  packages: write

jobs:
  security:
    uses: lpasquali/rune-ci/.github/workflows/security-scan.yml@9f939b2c28317b6f55c1913c6a6485bd91e1bda5 # main

  shell:
    uses: lpasquali/rune-ci/.github/workflows/shell-quality.yml@9f939b2c28317b6f55c1913c6a6485bd91e1bda5 # main
    with:
      script-dirs: "scripts"

  validate:
    uses: lpasquali/rune-ci/.github/workflows/generic-validate.yml@9f939b2c28317b6f55c1913c6a6485bd91e1bda5 # main
    with:
      validate-yaml: "scripts/validate_yaml.py"
      validate-vex: "scripts/validate_vex.py"

  compliance:
    needs: [security, shell, validate]
    if: always()
    uses: lpasquali/rune-ci/.github/workflows/pr-compliance.yml@4f45a889234bed748d7a20bb09bf4e7615219e2d # main
    with:
      needs-json: ${{ toJson(needs) }}
