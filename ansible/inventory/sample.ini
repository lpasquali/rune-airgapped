#
# Sample inventory for RUNE air-gapped cluster preparation.
#
# Customize this file with your actual node hostnames/IPs.
# All nodes must be reachable via SSH from the Ansible control node.

[rune_nodes]
# Control-plane nodes
cp-1 ansible_host=192.168.1.10
cp-2 ansible_host=192.168.1.11
cp-3 ansible_host=192.168.1.12

# Worker nodes
worker-1 ansible_host=192.168.1.20
worker-2 ansible_host=192.168.1.21

[rune_nodes:vars]
# SSH user for all nodes (must have sudo privileges)
ansible_user=rune-admin

# Registry address — must match the registry deployed by bootstrap.sh.
# This is the address nodes use to pull images (NodePort or LoadBalancer).
rune_registry_host=rune-registry.example.local
rune_registry_port=5000

# TLS certificate paths on the control node (source for distribution)
rune_tls_ca_cert=/etc/rune/tls/ca.crt
rune_tls_cert=/etc/rune/tls/server.crt
rune_tls_key=/etc/rune/tls/server.key

# Kubernetes API server port (for firewall rules)
k8s_api_port=6443

# --- Node role subgroups (optional) ---
[control_plane]
cp-1
cp-2
cp-3

[workers]
worker-1
worker-2
