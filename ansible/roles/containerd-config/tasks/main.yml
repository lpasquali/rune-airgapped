#
# containerd-config/tasks/main.yml — Configure containerd to use the
# air-gapped OCI registry as a mirror for all image pulls.
#
# This replicates the logic from scripts/bootstrap.sh Phase 5 (containerd
# mirror configuration) across multiple nodes via Ansible.
#
# References:
#   - https://github.com/containerd/containerd/blob/main/docs/hosts.md
#   - ADR-002 (docs/research/002-airgapped-registry.md)
---
- name: Generate default containerd config if missing
  ansible.builtin.command:
    cmd: containerd config default
  register: containerd_default_config
  changed_when: false

- name: Ensure containerd config directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write containerd config (if not already customized)
  ansible.builtin.copy:
    content: "{{ containerd_default_config.stdout }}"
    dest: /etc/containerd/config.toml
    owner: root
    group: root
    mode: "0644"
    # Do not overwrite if the file already exists (operator may have
    # customized it). Remove force: false to always reset to defaults.
    force: false
  notify: restart containerd

# Configure the registry mirror using containerd's hosts.d mechanism.
# This tells containerd to pull images from the air-gapped registry
# instead of reaching out to public registries.
- name: Create containerd hosts directory for registry mirror
  ansible.builtin.file:
    path: "/etc/containerd/certs.d/{{ rune_registry_host }}:{{ rune_registry_port }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure registry mirror host
  ansible.builtin.copy:
    dest: "/etc/containerd/certs.d/{{ rune_registry_host }}:{{ rune_registry_port }}/hosts.toml"
    content: |
      # Air-gapped RUNE registry mirror configuration
      # Generated by Ansible — do not edit manually
      server = "https://{{ rune_registry_host }}:{{ rune_registry_port }}"

      [host."https://{{ rune_registry_host }}:{{ rune_registry_port }}"]
        capabilities = ["pull", "resolve"]
        ca = "/etc/containerd/certs.d/{{ rune_registry_host }}:{{ rune_registry_port }}/ca.crt"
    owner: root
    group: root
    mode: "0644"
  notify: restart containerd

# Ensure containerd config.toml has the config_path set for hosts.d
- name: Enable containerd hosts.d config path
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*config_path\s*='
    line: '      config_path = "/etc/containerd/certs.d"'
    insertafter: '\[plugins\."io\.containerd\.grpc\.v1\.cri"\.registry\]'
    state: present
  notify: restart containerd

# Handler to restart containerd after configuration changes
- name: Flush handlers  # noqa: run-once[task]
  ansible.builtin.meta: flush_handlers

# -- Handlers --
# Note: handlers are typically in roles/<name>/handlers/main.yml.
# Included inline here for template simplicity. Move to handlers/
# directory for production use.
