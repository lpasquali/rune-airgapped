---
- name: restart containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    daemon_reload: true

- name: update ca trust debian
  ansible.builtin.command:
    cmd: update-ca-certificates
  changed_when: true

- name: update ca trust redhat
  ansible.builtin.command:
    cmd: update-ca-trust extract
  changed_when: true
