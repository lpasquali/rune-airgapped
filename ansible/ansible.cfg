#
# Ansible configuration for RUNE air-gapped cluster preparation.
# See ADR-003 (docs/research/003-automation-framework.md) for rationale.

[defaults]
# Inventory file location (override with -i flag)
inventory = inventory/sample.ini

# Roles path (relative to this config file)
roles_path = roles

# Disable host key checking for initial provisioning.
# In production, set to True and pre-distribute SSH keys.
host_key_checking = False

# Increase default timeout for air-gapped nodes that may be slow
timeout = 30

# Gather only the minimum facts needed (faster execution)
gathering = smart

# Log output for audit trail (IEC 62443 SM-10)
log_path = /var/log/rune-ansible.log

# Retry files location
retry_files_save_path = /tmp

[privilege_escalation]
# Most tasks require root for package installation and system config
become = True
become_method = sudo

[ssh_connection]
# Pipelining reduces SSH round-trips; requires requiretty disabled in sudoers
pipelining = True
