# RBAC for rune-docs in rune namespace
# IEC 62443 SR 2.1: No K8s API access — static site only.
# IEC 62443 SR 1.1: Dedicated ServiceAccount, automount disabled.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rune-docs
  namespace: rune
  labels:
    app.kubernetes.io/name: rune-docs
    app.kubernetes.io/part-of: rune
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rune-docs
  namespace: rune
  labels:
    app.kubernetes.io/name: rune-docs
    app.kubernetes.io/part-of: rune
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rune-docs
  namespace: rune
  labels:
    app.kubernetes.io/name: rune-docs
    app.kubernetes.io/part-of: rune
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rune-docs
subjects:
  - kind: ServiceAccount
    name: rune-docs
    namespace: rune
