  podSelector:
    matchLabels:
      app.kubernetes.io/name: rune-registry
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: rune
      ports:
        - protocol: TCP
          port: 5000
---
# Rule 8 (egress side): Pods in rune namespace -> Registry
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-registry
  namespace: rune
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rune-registry
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rune-registry
