  namespace: rune-system
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rune-operator
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 443
