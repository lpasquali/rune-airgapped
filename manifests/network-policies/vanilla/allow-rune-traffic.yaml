# Explicit allow rules for RUNE inter-service communication
# IEC 62443 SR 5.2: Zone boundary protection — each rule is a documented conduit.
---
# Rule 4: UI -> API (TCP/8080)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ui-to-api
  namespace: rune
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rune-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rune-ui
      ports:
        - protocol: TCP
          port: 8080
---
# Rule 4 (egress side): UI -> API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ui-egress-to-api
  namespace: rune
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rune-ui
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rune-api
      ports:
        - protocol: TCP
          port: 8080
---
# Rule 5: Operator -> API (TCP/8080, cross-namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-operator-to-api
  namespace: rune
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rune-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rune-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rune-operator
      ports:
        - protocol: TCP
          port: 8080
---
# Rule 5 (egress side): Operator -> API (cross-namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-operator-egress-to-api
  namespace: rune-system
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rune-operator
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rune
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rune-api
      ports:
        - protocol: TCP
          port: 8080
---
