# Default-deny ingress and egress for all RUNE namespaces
# IEC 62443 SR 5.1: Network segmentation — deny by default.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: rune
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: rune
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: rune-system
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: rune-system
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: rune-registry
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: rune-registry
  labels:
    app.kubernetes.io/part-of: rune
spec:
  podSelector: {}
  policyTypes:
    - Egress
