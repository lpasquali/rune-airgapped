# Helmfile: Declarative deployment of all RUNE charts
# IEC 62443 SR 7.6: Version-controlled, auditable deployment configuration.
# IEC 62443 SM-10: All charts pulled from local OCI registry only.
---
repositories:
  - name: rune-local
    url: oci://rune-registry.rune-registry.svc:5000

environments:
  default:
    values:
      - values/defaults.yaml
  production:
    values:
      - values/defaults.yaml
      - values/production.yaml

releases:
  # Optional: Crossplane v2 for declarative infrastructure provisioning
  # of external PostgreSQL / object-storage, via the XRDs + Compositions
  # shipped in rune-charts/crossplane. Opt-in per environment via
  # `crossplane.enabled: true` (default: false).
  - name: crossplane
    namespace: crossplane-system
    chart: rune-local/crossplane
    version: "{{ .Values.crossplaneVersion }}"
    condition: crossplane.enabled
    values:
      - values/crossplane.yaml
    labels:
      tier: infrastructure

  - name: rune-operator
    namespace: rune-system
    chart: rune-local/rune-operator
    version: "{{ .Values.runeVersion }}"
    values:
      - values/rune-operator.yaml
    labels:
      tier: control-plane

  - name: rune-api
    namespace: rune
    chart: rune-local/rune
    version: "{{ .Values.runeVersion }}"
    values:
      - values/rune-api.yaml
    needs:
      - rune-system/rune-operator
    labels:
      tier: application

  - name: rune-ui
    namespace: rune
    chart: rune-local/rune-ui
    version: "{{ .Values.runeVersion }}"
    values:
      - values/rune-ui.yaml
    needs:
      - rune/rune-api
    labels:
      tier: application
